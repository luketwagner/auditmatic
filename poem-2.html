    <h1 class="poem-title">Morning Light</h1>

    <article class="poem-body">
      <section class="stanza">
        <p>First gold across the sill, the room still cool and half asleep.</p>
        <p>You turn once more before the day takes everything you keep.</p>
      </section>
      <section class="stanza">
        <p>Then coffee, then the list, then traffic, then the screen.</p>
        <p>But for a moment there was only light—and nothing in between.</p>
      </section>
    </article>
